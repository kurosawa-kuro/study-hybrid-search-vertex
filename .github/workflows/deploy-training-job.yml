name: Deploy Training Job

on:
  push:
    branches: [main]
    paths:
      - jobs/**
      - common/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-training-job.yml
      - .github/actions/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  PROJECT_ID: mlops-dev-a
  REPO: mlops
  JOB: training-job

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gcp
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          configure_docker: "true"

      - uses: ./.github/actions/build-and-push
        id: build
        with:
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          repo: ${{ env.REPO }}
          image: ${{ env.JOB }}
          dockerfile: jobs/Dockerfile

      # Doppler-managed env (W&B key etc.) is optional. When DOPPLER_TOKEN_JOB
      # is provided, secrets from the Doppler project are appended to the
      # Job env. Absent the token, only the static vars below are set.
      # See docs/04_運用.md STEP 10 for token setup.
      - name: Install Doppler CLI
        if: ${{ secrets.DOPPLER_TOKEN_JOB != '' }}
        uses: dopplerhq/cli-action@v3

      - name: Collect Doppler secrets
        id: doppler
        if: ${{ secrets.DOPPLER_TOKEN_JOB != '' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_JOB }}
        run: |
          DOPPLER_ENV=$(doppler secrets download --no-file --format env-no-quotes \
            | grep '=' | tr '\n' '|' | sed 's/|$//')
          echo "vars=$DOPPLER_ENV" >> "$GITHUB_OUTPUT"

      - name: Update Cloud Run Jobs
        env:
          STATIC_ENV: "PROJECT_ID=${{ env.PROJECT_ID }}|GIT_SHA=${{ github.sha }}"
          DOPPLER_ENV: ${{ steps.doppler.outputs.vars }}
        run: |
          # Truncate sha to 8 chars (runner-side, so env expansion is safe).
          SHORT_SHA="${GITHUB_SHA::8}"
          STATIC="PROJECT_ID=${{ env.PROJECT_ID }}|GIT_SHA=${SHORT_SHA}"
          ENV_ARG="^|^${STATIC}"
          if [ -n "${DOPPLER_ENV}" ]; then
            ENV_ARG="${ENV_ARG}|${DOPPLER_ENV}"
          fi
          gcloud run jobs update ${{ env.JOB }} \
            --region ${{ env.REGION }} \
            --image "${{ steps.build.outputs.image_uri }}" \
            --service-account sa-job-train@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "${ENV_ARG}"
