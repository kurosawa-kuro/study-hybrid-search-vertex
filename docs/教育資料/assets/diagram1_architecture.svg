<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 20px; fill: #475569; }
      .label { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 24px; fill: #0f172a; }
      .small { font-size: 20px; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; rx: 14; ry: 14; }
      .data { fill: #ecfeff; stroke: #0f766e; stroke-width: 2.5; rx: 14; ry: 14; }
      .job { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; rx: 14; ry: 14; }
      .service { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.5; rx: 14; ry: 14; }
      .artifact { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 2.5; rx: 14; ry: 14; }
      .group { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 10 8; rx: 18; ry: 18; }
      .line { stroke: #334155; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 9 7; }
    </style>
  </defs>

  <text x="60" y="56" class="title">全体アーキテクチャ</text>
  <text x="60" y="88" class="subtitle">Dataform → embedding-job → training-job → search-api を中心にした MLOps パイプライン</text>

  <rect x="40" y="120" width="720" height="250" class="group"/>
  <text x="65" y="150" class="subtitle">データ整備と埋め込み生成</text>

  <rect x="90" y="210" width="190" height="72" class="data"/>
  <text x="185" y="255" text-anchor="middle" class="label">raw.properties</text>

  <rect x="340" y="210" width="170" height="72" class="box"/>
  <text x="425" y="255" text-anchor="middle" class="label">Dataform</text>

  <rect x="570" y="210" width="230" height="72" class="data"/>
  <text x="685" y="242" text-anchor="middle" class="label small">feature_mart</text>
  <text x="685" y="268" text-anchor="middle" class="label small">property_features_daily</text>

  <rect x="340" y="320" width="200" height="72" class="job"/>
  <text x="440" y="365" text-anchor="middle" class="label">embedding-job</text>

  <rect x="600" y="320" width="220" height="72" class="data"/>
  <text x="710" y="352" text-anchor="middle" class="label small">feature_mart</text>
  <text x="710" y="378" text-anchor="middle" class="label small">property_embeddings</text>

  <line x1="280" y1="246" x2="340" y2="246" class="line"/>
  <line x1="510" y1="246" x2="570" y2="246" class="line"/>
  <line x1="685" y1="282" x2="685" y2="320" class="line"/>
  <line x1="540" y1="356" x2="600" y2="356" class="line"/>

  <rect x="860" y="120" width="700" height="250" class="group"/>
  <text x="885" y="150" class="subtitle">学習とモデル保存</text>

  <rect x="920" y="190" width="230" height="72" class="data"/>
  <text x="1035" y="222" text-anchor="middle" class="label small">ranking_log +</text>
  <text x="1035" y="248" text-anchor="middle" class="label small">feedback_events</text>

  <rect x="1210" y="190" width="190" height="72" class="job"/>
  <text x="1305" y="235" text-anchor="middle" class="label">training-job</text>

  <rect x="1180" y="320" width="190" height="72" class="artifact"/>
  <text x="1275" y="352" text-anchor="middle" class="label small">GCS</text>
  <text x="1275" y="378" text-anchor="middle" class="label small">model.txt</text>

  <rect x="1410" y="320" width="130" height="72" class="data"/>
  <text x="1475" y="352" text-anchor="middle" class="label small">mlops</text>
  <text x="1475" y="378" text-anchor="middle" class="label small">training_runs</text>

  <line x1="1150" y1="226" x2="1210" y2="226" class="line"/>
  <line x1="1305" y1="262" x2="1275" y2="320" class="line"/>
  <line x1="1340" y1="262" x2="1450" y2="320" class="line"/>

  <rect x="40" y="430" width="1520" height="270" class="group"/>
  <text x="65" y="460" class="subtitle">推論とログ返却</text>

  <rect x="90" y="540" width="130" height="72" class="box"/>
  <text x="155" y="585" text-anchor="middle" class="label">user</text>

  <rect x="280" y="540" width="230" height="72" class="service"/>
  <text x="395" y="572" text-anchor="middle" class="label small">search-api</text>
  <text x="395" y="598" text-anchor="middle" class="label small">on Cloud Run</text>

  <rect x="570" y="470" width="180" height="72" class="box"/>
  <text x="660" y="515" text-anchor="middle" class="label">query embedding</text>

  <rect x="810" y="470" width="250" height="72" class="data"/>
  <text x="935" y="502" text-anchor="middle" class="label small">Meilisearch + BigQuery</text>
  <text x="935" y="528" text-anchor="middle" class="label small">BM25 + VECTOR_SEARCH</text>

  <rect x="1120" y="470" width="150" height="72" class="box"/>
  <text x="1195" y="515" text-anchor="middle" class="label">rerank</text>

  <rect x="1330" y="470" width="180" height="72" class="box"/>
  <text x="1420" y="515" text-anchor="middle" class="label">response</text>

  <rect x="810" y="590" width="210" height="72" class="data"/>
  <text x="915" y="622" text-anchor="middle" class="label small">ranking_log</text>
  <text x="915" y="648" text-anchor="middle" class="label small">/ feedback</text>

  <line x1="220" y1="576" x2="280" y2="576" class="line"/>
  <line x1="510" y1="576" x2="570" y2="520" class="line"/>
  <line x1="750" y1="506" x2="810" y2="506" class="line"/>
  <line x1="1060" y1="506" x2="1120" y2="506" class="line"/>
  <line x1="1270" y1="506" x2="1330" y2="506" class="line"/>
  <line x1="1420" y1="542" x2="1420" y2="576" class="line dashed"/>
  <line x1="1420" y1="576" x2="220" y2="576" class="line dashed"/>
  <line x1="395" y1="612" x2="395" y2="626" class="line"/>
  <line x1="395" y1="626" x2="810" y2="626" class="line"/>

  <line x1="710" y1="392" x2="710" y2="470" class="line dashed"/>
  <line x1="1275" y1="392" x2="1275" y2="430" class="line dashed"/>
  <line x1="1275" y1="430" x2="1195" y2="470" class="line dashed"/>

  <text x="725" y="436" class="subtitle">lexical と semantic の両系統を参照</text>
  <text x="1160" y="446" class="subtitle">学習済み model を参照</text>
</svg>
